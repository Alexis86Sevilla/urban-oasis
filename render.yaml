services:
  - type: web
    name: urban-oasis-backend
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urban-oasis-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: urban-oasis-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: urban-oasis-db
          property: password
      - key: JPA_DDL_AUTO
        value: update
      - key: CORS_ORIGINS
        value: "https://urban-oasis.pages.dev"
      - key: PORT
        value: "8080"

databases:
  - name: urban-oasis-db
    plan: free
