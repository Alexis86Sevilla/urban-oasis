<div class="relative w-full h-full">

  <div class="absolute inset-0 z-0">
    <app-map-view></app-map-view>
  </div>

  <div class="absolute top-0 left-0 w-full z-[1000] p-3 sm:p-4 pt-4 sm:pt-6 px-4 sm:px-6 lg:px-12 xl:px-20 pointer-events-none flex flex-col gap-2 sm:gap-3">

    <div class="flex flex-row gap-1.5">
      @if (wheater()) {
      <div class="{{temperatureIndicator().class}} pointer-events-auto h-14 min-w-[80px] backdrop-blur-sm rounded-2xl shadow-lg border border-gray-100 flex items-center justify-center text-lg font-bold">
        {{ temperatureIndicator().temp }}
      </div>

      <div class="{{windInfo().class}} pointer-events-auto h-14 min-w-[80px] rounded-2xl shadow-lg border border-gray-100 flex flex-col items-center justify-center">
        <span class="text-xs font-bold">{{windInfo().text}}</span>
        <span class="text-[10px] opacity-75">{{windInfo().speed}}</span>
        <span class="text-[10px] opacity-75">{{windInfo().description}}</span>
      </div>
      }
      <button (click)="updateActualPosition()" class="pointer-events-auto cursor-pointer px-4 py-2 rounded-2xl bg-white/95 shadow-lg border border-gray-100 hover:bg-white transition-colors duration-200">
        <img class="w-8 h-8 hover:scale-140 transition-transform duration-400" src="icons/map/location-icon.svg" alt="Buscar">
      </button>
    </div>

    <div class="pointer-events-auto flex gap-1.5 sm:gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 sm:mx-0 sm:px-0">
      <div (click)="filter('ALL')"
           [class.bg-teal-50]="oasisService.activeFilter() === 'ALL'"
           [class.text-teal-700]="oasisService.activeFilter() === 'ALL'"
           [class.border-teal-100]="oasisService.activeFilter() === 'ALL'"
           [class.bg-white]="oasisService.activeFilter() !== 'ALL'"
           [class.text-slate-600]="oasisService.activeFilter() !== 'ALL'"
           class="px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full font-medium text-xs sm:text-sm shadow-lg whitespace-nowrap cursor-pointer transition-colors duration-200 active:scale-95">🗺️ Todo</div>
      <div (click)="filter('WATER_FOUNTAIN')"
           [class.bg-teal-50]="oasisService.activeFilter() === 'WATER_FOUNTAIN'"
           [class.text-teal-700]="oasisService.activeFilter() === 'WATER_FOUNTAIN'"
           [class.border-teal-100]="oasisService.activeFilter() === 'WATER_FOUNTAIN'"
           [class.bg-white]="oasisService.activeFilter() !== 'WATER_FOUNTAIN'"
           [class.text-slate-600]="oasisService.activeFilter() !== 'WATER_FOUNTAIN'"
           class="px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full font-medium text-xs sm:text-sm shadow-lg whitespace-nowrap cursor-pointer transition-colors duration-200 active:scale-95">💧 Fuentes</div>
      <div (click)="filter('SHADE')"
           [class.bg-teal-50]="oasisService.activeFilter() === 'SHADE'"
           [class.text-teal-700]="oasisService.activeFilter() === 'SHADE'"
           [class.border-teal-100]="oasisService.activeFilter() === 'SHADE'"
           [class.bg-white]="oasisService.activeFilter() !== 'SHADE'"
           [class.text-slate-600]="oasisService.activeFilter() !== 'SHADE'"
           class="px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full font-medium text-xs sm:text-sm shadow-lg whitespace-nowrap cursor-pointer transition-colors duration-200 active:scale-95">🌳 Sombra</div>
      <div (click)="filter('AC_BUILDING')"
           [class.bg-teal-50]="oasisService.activeFilter() === 'AC_BUILDING'"
           [class.text-teal-700]="oasisService.activeFilter() === 'AC_BUILDING'"
           [class.border-teal-100]="oasisService.activeFilter() === 'AC_BUILDING'"
           [class.bg-white]="oasisService.activeFilter() !== 'AC_BUILDING'"
           [class.text-slate-600]="oasisService.activeFilter() !== 'AC_BUILDING'"
           class="px-2.5 sm:px-4 py-1.5 sm:py-2 rounded-full font-medium text-xs sm:text-sm shadow-lg whitespace-nowrap cursor-pointer transition-colors duration-200 active:scale-95">❄️ A/A</div>
    </div>

  </div>

</div>
