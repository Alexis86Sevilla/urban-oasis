<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Urban Oasis</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d9488">
  <meta name="description" content="Encuentra fuentes de agua, sombra y aire acondicionado cerca de ti">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <style>
    .uo-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .uo-loading-screen h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0d9488;
    }
    .uo-loading-screen p {
      margin: 0;
      font-size: 0.875rem;
      color: #64748b;
    }
    .uo-loading-spinner {
      width: 2rem;
      height: 2rem;
      border: 4px solid #99f6e4;
      border-top-color: #0d9488;
      border-radius: 50%;
      animation: uo-spin 1s linear infinite;
    }
    @keyframes uo-spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
</head>

<body>
  <app-root></app-root>
</body>
</html>
